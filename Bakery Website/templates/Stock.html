<style>
    .ordercontainer {
        display: flex;
        flex-wrap: wrap;
        gap: 15px; 
        justify-content: flex-start; 
    }

    .order-box {
        width: 200px; 
        padding: 15px;
        background: white;
        box-shadow: 0px 0px 8px rgba(0, 0, 0, 0.1);
        border-radius: 8px;
        text-align: center;
    }

    h1, h2, p {
        margin: 5px 0; 
    }
</style>

{% include 'AdminHeader.html' %}

{% if user %}
    <div class="ordercontainer">
        {% for items in data1 %}
            <div class="order-box">
                <h1>Product - {{items[0][3]}}</h1>
                <h2>Amount - {{ items[0][1] }}</h2>
                <h3 style="color: {{ 'red' if items[0][2] == 'Y' else 'green' }};">
                     Need stock? - {{ items[0][2] }}
                </h3>
    
                {% for item in items %}
                    <button><a href = "/EditStock/{{item[0]}}" method="GET"> EditStock</a></button>
                {% endfor %}
            </div>
        {% endfor %}
    </div>
{% endif %}
