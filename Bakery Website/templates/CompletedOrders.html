<style>
    .ordercontainer {
        display: flex;
        flex-wrap: wrap;
        gap: 15px; 
        justify-content: flex-start; 
        
    }

    .order-box {
        width: 200px; 
        padding: 15px;
        background: lightgreen;
        box-shadow: 0px 0px 8px rgba(0, 0, 0, 0.1);
        border-radius: 8px;
        text-align: center;
        border: 10px solid white;
        
        
    }

    h1, h2, p {
        margin: 5px 0; 
    }
</style>

{% include 'AdminHeader.html' %}

{% if user %}
<br>
    <div class="ordercontainer" style="margin-left: 10px;">
        {% for items in data %}
            <div class="order-box">
                <h1>Order - {{ items[0][0] }}</h1>
                <h2>Name - {{ items[0][2] }}, {{ items[0][3] }}</h2>
                <h3>Order Total - {{ items[0][1] }}</h3>
                
                {% for item in items %}
                    <p>{{ item[4] }}</p>
                
                {% endfor %}
            </div>
        {% endfor %}
    </div>
{% endif %}
